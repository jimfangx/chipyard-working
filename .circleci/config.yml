version: 2.1

parameters:
  run_ci:
    type: boolean
    default: false
  pr_number:
    type: string
    default: ""

commands:
  install_miniforge:
    description: Install Miniforge into CONDA_INSTALL_DIR and activate base.
    steps:
      - run:
          name: Install conda
          command: |
            set -euo pipefail
            mkdir -p "$(dirname "${CONDA_INSTALL_DIR}")"
            wget -O Miniforge3.sh "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"
            bash Miniforge3.sh -b -p "${CONDA_INSTALL_DIR}"
            source "${CONDA_INSTALL_DIR}/etc/profile.d/conda.sh"
            if [ -f "${CONDA_INSTALL_DIR}/etc/profile.d/mamba.sh" ]; then
              source "${CONDA_INSTALL_DIR}/etc/profile.d/mamba.sh"
            fi
            conda activate

  docker_login_ghcr:
    description: Log in to GHCR with the CircleCI-provided GHCR_TOKEN.
    steps:
      - run:
          name: Log in to GHCR
          command: |
            set -euo pipefail
            if [ -z "${GHCR_TOKEN:-}" ]; then
              echo "GHCR_TOKEN must be set in CircleCI to publish the container." >&2
              exit 1
            fi

            ghcr_username="${GHCR_USERNAME:-${CIRCLE_PROJECT_USERNAME}}"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${ghcr_username}" --password-stdin

  checkout_pr_merge:
    description: Check out the GitHub pull request merge ref requested by the GitHub Actions orchestrator.
    steps:
      - checkout
      - run:
          name: Check out pull request merge ref
          command: |
            set -euo pipefail
            pr_number="<< pipeline.parameters.pr_number >>"
            if [ -z "${pr_number}" ]; then
              echo "pr_number pipeline parameter is required." >&2
              exit 1
            fi
            git fetch origin "pull/${pr_number}/merge"
            git checkout --detach FETCH_HEAD
            git rev-parse --short HEAD

executors:
  ubuntu_machine:
    machine:
      image: ubuntu-2404:current
    resource_class: xlarge

jobs:
  build-setup-ubuntu:
    executor: ubuntu_machine
    working_directory: ~/project
    environment:
      CONDA_INSTALL_DIR: /home/circleci/project/.ci/conda
      FORCE_NON_EC2: "1"
      JVM_OPTS: -Xmx3200m
    steps:
      - checkout_pr_merge
      - install_miniforge
      - run:
          name: Run build setup
          no_output_timeout: 30m
          command: |
            set -euo pipefail
            git config --global --add safe.directory "*"
            source "${CONDA_INSTALL_DIR}/etc/profile.d/conda.sh"
            if [ -f "${CONDA_INSTALL_DIR}/etc/profile.d/mamba.sh" ]; then
              source "${CONDA_INSTALL_DIR}/etc/profile.d/mamba.sh"
            fi
            conda activate
            ./build-setup.sh riscv-tools
            grep -F "Setup complete!" build-setup.log

  build-setup-rhel:
    executor: ubuntu_machine
    working_directory: ~/project
    environment:
      FORCE_NON_EC2: "1"
      JVM_OPTS: -Xmx3200m
      RHEL_CONDA_INSTALL_DIR: /workspace/.ci/rhel-conda
    steps:
      - checkout_pr_merge
      - run:
          name: Run build setup in RHEL 9
          no_output_timeout: 30m
          command: |
            set -euo pipefail
            docker run --rm \
              --volume "${PWD}:/workspace" \
              --workdir /workspace \
              --env "CONDA_INSTALL_DIR=${RHEL_CONDA_INSTALL_DIR}" \
              --env "FORCE_NON_EC2=${FORCE_NON_EC2}" \
              --env "JVM_OPTS=${JVM_OPTS}" \
              registry.access.redhat.com/ubi9/ubi:latest \
              bash -leo pipefail -c '
                dnf install -y \
                  bzip2 \
                  findutils \
                  git \
                  gzip \
                  make \
                  patch \
                  procps-ng \
                  python3 \
                  tar \
                  unzip \
                  wget \
                  which \
                  xz

                git config --global --add safe.directory "*"

                mkdir -p "$(dirname "${CONDA_INSTALL_DIR}")"
                wget -O Miniforge3.sh "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"
                bash Miniforge3.sh -b -p "${CONDA_INSTALL_DIR}"
                source "${CONDA_INSTALL_DIR}/etc/profile.d/conda.sh"
                if [ -f "${CONDA_INSTALL_DIR}/etc/profile.d/mamba.sh" ]; then
                  source "${CONDA_INSTALL_DIR}/etc/profile.d/mamba.sh"
                fi
                conda activate

                ./build-setup.sh riscv-tools
                grep -F "Setup complete!" build-setup.log
              '

  build-and-publish-container:
    executor: ubuntu_machine
    working_directory: ~/project
    environment:
      FORCE_NON_EC2: "1"
    steps:
      - checkout_pr_merge
      - docker_login_ghcr
      - run:
          name: Build and publish container
          no_output_timeout: 30m
          command: |
            set -euo pipefail

            chipyard_ref="<< pipeline.parameters.pr_number >>"

            image_name="ghcr.io/${CIRCLE_PROJECT_USERNAME,,}/${CIRCLE_PROJECT_REPONAME,,}"
            unix_timestamp="$(date +%s)"
            image_ref="${image_name}:pr-${chipyard_ref}"

            docker build \
              --file dockerfiles/Dockerfile \
              --target base-with-tools \
              --build-arg "CHIPYARD_REPO=https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git" \
              --build-arg "CHIPYARD_REF=${chipyard_ref}" \
              --label "org.chipyard.ci.unix-timestamp=${unix_timestamp}" \
              --tag "${image_ref}" \
              .

            docker push "${image_ref}"

            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN must be set in CircleCI to dispatch GitHub Actions generator tests." >&2
              exit 1
            fi

            dispatch_ref="main"
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/actions/workflows/run-generator-tests.yml/dispatches" \
              -d "{\"ref\":\"${dispatch_ref}\",\"inputs\":{\"container_image\":\"${image_ref}\"}}"

workflows:
  chipyard-pull-request-ci:
    when: << pipeline.parameters.run_ci >>
    jobs:
      - build-setup-ubuntu
      - build-setup-rhel
      - build-and-publish-container:
          requires:
            - build-setup-ubuntu
            - build-setup-rhel
