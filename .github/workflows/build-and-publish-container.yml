name: build and publish container

on:
  workflow_call:
    inputs:
      chipyard_ref:
        required: true
        type: string
    outputs:
      image_ref:
        value: ${{ jobs.build-and-publish-container.outputs.image_ref }}

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  build-and-publish-container:
    name: build and publish container
    runs-on: ubuntu-24.04
    outputs:
      image_ref: ${{ steps.publish.outputs.image_ref }}
    env:
      DOCKER_DATA_ROOT: ${{ github.workspace }}/.ci/docker
      FORCE_NON_EC2: 1
    steps:
      - name: Maximize build space
        uses: jimfangx/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 10240
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Move Docker storage to workspace
        run: |
          sudo systemctl stop docker
          sudo mkdir -p "${DOCKER_DATA_ROOT}"
          printf '{ "data-root": "%s" }\n' "${DOCKER_DATA_ROOT}" | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          docker info --format 'Docker root: {{ .DockerRootDir }}'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container
        id: publish
        env:
          CHIPYARD_REF: ${{ inputs.chipyard_ref }}
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          unix_timestamp="$(date +%s)"
          image_ref="${image_name}:pr-${CHIPYARD_REF}"

          docker build \
            --file dockerfiles/Dockerfile \
            --target base-with-tools \
            --build-arg "CHIPYARD_REPO=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" \
            --build-arg "CHIPYARD_REF=${CHIPYARD_REF}" \
            --label "org.chipyard.ci.unix-timestamp=${unix_timestamp}" \
            --tag "${image_ref}" \
            .

          docker push "${image_ref}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"
