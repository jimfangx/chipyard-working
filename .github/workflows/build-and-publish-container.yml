name: build and publish container

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  build-and-publish-container:
    name: build and publish container
    runs-on: ubuntu-24.04
    env:
      DOCKER_DATA_ROOT: ${{ github.workspace }}/.ci/docker
      FORCE_NON_EC2: 1
    steps:
      - name: Maximize build space
        uses: jimfangx/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 10240
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Move Docker storage to workspace
        run: |
          sudo systemctl stop docker
          sudo mkdir -p "${DOCKER_DATA_ROOT}"
          printf '{ "data-root": "%s" }\n' "${DOCKER_DATA_ROOT}" | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          docker info --format 'Docker root: {{ .DockerRootDir }}'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          unix_timestamp="$(date +%s)"
          image_ref="${image_name}:main"
          base_image="${image_name}:main-base-${unix_timestamp}"
          container_name="chipyard-main-setup-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          trap 'docker rm -f "${container_name}" > /dev/null 2>&1 || true' EXIT

          docker build \
            --file dockerfiles/Dockerfile \
            --target base \
            --build-arg "CHIPYARD_REPO=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" \
            --build-arg "CHIPYARD_REF=main" \
            --label "org.chipyard.ci.unix-timestamp=${unix_timestamp}" \
            --tag "${base_image}" \
            .

          docker rm -f "${container_name}" > /dev/null 2>&1 || true
          docker run \
            --name "${container_name}" \
            --privileged \
            --env FORCE_NON_EC2="${FORCE_NON_EC2}" \
            --env JVM_OPTS="-Xmx3200m" \
            "${base_image}" \
            bash -leo pipefail -c '
              cd /root/chipyard
              git config --global --add safe.directory "*"
              source "${CONDA_INSTALL_DIR}/etc/profile.d/conda.sh"
              if [ -f "${CONDA_INSTALL_DIR}/etc/profile.d/mamba.sh" ]; then
                source "${CONDA_INSTALL_DIR}/etc/profile.d/mamba.sh"
              fi
              conda activate
              ./build-setup.sh riscv-tools
              grep -F "Setup complete!" build-setup.log
            '

          docker commit \
            --change 'ENTRYPOINT ["chipyard/scripts/entrypoint.sh"]' \
            --change 'CMD ["/bin/sh"]' \
            --change "LABEL org.chipyard.ci.unix-timestamp=${unix_timestamp}" \
            "${container_name}" \
            "${image_ref}"

          docker push "${image_ref}"
