name: Chipyard Pull Request CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  circleci-orchestrator:
    name: circleci-orchestrator
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    env:
      CIRCLECI_TOKEN: ${{ secrets.CIRCLECI_TOKEN }}
      CIRCLECI_PIPELINE_DEFINITION_ID: ${{ vars.CIRCLECI_PIPELINE_DEFINITION_ID }}
      CIRCLECI_PROJECT_SLUG: ${{ vars.CIRCLECI_PROJECT_SLUG }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Check ci:disable label
        id: ci-label
        run: |
          if jq -e 'index("ci:disable") != null' <<< "${PR_LABELS}" > /dev/null; then
            echo "ci_disabled=true" >> "${GITHUB_OUTPUT}"
            echo "ci:disable is present; CircleCI workflows for this PR will be canceled." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "ci_disabled=false" >> "${GITHUB_OUTPUT}"
            echo "ci:disable is not present; CircleCI will be triggered." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Cancel CircleCI workflows for this PR
        if: ${{ steps.ci-label.outputs.ci_disabled == 'true' }}
        run: |
          if [ -z "${CIRCLECI_TOKEN}" ]; then
            echo "CIRCLECI_TOKEN is required to cancel CircleCI workflows." >&2
            exit 1
          fi
          if [ -z "${CIRCLECI_PROJECT_SLUG}" ]; then
            echo "CIRCLECI_PROJECT_SLUG repo variable is required." >&2
            exit 1
          fi
          echo "Using CircleCI project slug: ${CIRCLECI_PROJECT_SLUG}"

          python3 <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ["CIRCLECI_TOKEN"]
          project_slug = os.environ["CIRCLECI_PROJECT_SLUG"]
          pr_head_ref = os.environ["PR_HEAD_REF"]
          pr_number = os.environ["PR_NUMBER"]
          base_url = "https://circleci.com/api/v2"
          headers = {"Circle-Token": token, "Accept": "application/json"}
          cancel_statuses = {"created", "queued", "running", "on_hold", "not_run"}

          def request_json(method, url, body=None):
              data = None
              request_headers = dict(headers)
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  request_headers["Content-Type"] = "application/json"
              request = urllib.request.Request(url, data=data, headers=request_headers, method=method)
              with urllib.request.urlopen(request) as response:
                  if response.status == 204:
                      return {}
                  text = response.read().decode("utf-8")
                  return json.loads(text) if text else {}

          def get(path, params=None):
              url = f"{base_url}{path}"
              if params:
                  url += "?" + urllib.parse.urlencode(params)
              return request_json("GET", url)

          def post(path):
              return request_json("POST", f"{base_url}{path}", {})

          pipelines = get(
              f"/project/{project_slug}/pipeline",
              {"branch": pr_head_ref},
          ).get("items", [])

          canceled = []
          for pipeline in pipelines:
              pipeline_id = pipeline["id"]
              values = get(f"/pipeline/{pipeline_id}/values")
              values_pr_number = str(values.get("pipeline.parameters.pr_number", ""))
              values_run_ci = values.get("pipeline.parameters.run_ci")
              run_ci_enabled = values_run_ci is True or str(values_run_ci).lower() == "true"
              if values_pr_number != pr_number or not run_ci_enabled:
                  continue

              workflows = get(f"/pipeline/{pipeline_id}/workflow").get("items", [])
              for workflow in workflows:
                  if workflow.get("status") not in cancel_statuses:
                      continue
                  post(f"/workflow/{workflow['id']}/cancel")
                  canceled.append(f"{workflow.get('name', workflow['id'])}:{workflow.get('status')}")

          print(f"Canceled {len(canceled)} CircleCI workflow(s): {', '.join(canceled) or 'none'}")
          PY

      - name: Trigger CircleCI workflow for this PR
        if: ${{ steps.ci-label.outputs.ci_disabled != 'true' }}
        run: |
          if [ -z "${CIRCLECI_TOKEN}" ]; then
            echo "CIRCLECI_TOKEN is required to trigger CircleCI." >&2
            exit 1
          fi
          if [ -z "${CIRCLECI_PROJECT_SLUG}" ]; then
            echo "CIRCLECI_PROJECT_SLUG repo variable is required." >&2
            exit 1
          fi
          project_slug="${CIRCLECI_PROJECT_SLUG}"
          echo "Using CircleCI project slug: ${project_slug}"
          checkout_ref="pull/${PR_NUMBER}/merge"

          if [[ "${project_slug}" == circleci/* ]]; then
            if [ -z "${CIRCLECI_PIPELINE_DEFINITION_ID}" ]; then
              echo "CIRCLECI_PIPELINE_DEFINITION_ID repo variable is required for CircleCI GitHub App projects." >&2
              exit 1
            fi

            IFS=/ read -r circleci_provider circleci_org circleci_project <<< "${project_slug}"
            trigger_url="https://circleci.com/api/v2/project/${circleci_provider}/${circleci_org}/${circleci_project}/pipeline/run"
            jq -n \
              --arg definition_id "${CIRCLECI_PIPELINE_DEFINITION_ID}" \
              --arg config_branch "${checkout_ref}" \
              --arg checkout_branch "${checkout_ref}" \
              --arg pr_number "${PR_NUMBER}" \
              '{
                definition_id: $definition_id,
                config: {
                  branch: $config_branch
                },
                checkout: {
                  branch: $checkout_branch
                },
                parameters: {
                  run_ci: true,
                  pr_number: $pr_number
                }
              }' > circleci-pipeline.json
          else
            trigger_url="https://circleci.com/api/v2/project/${project_slug}/pipeline"
            jq -n \
              --arg branch "${checkout_ref}" \
              --arg pr_number "${PR_NUMBER}" \
              '{
                branch: $branch,
                parameters: {
                  run_ci: true,
                  pr_number: $pr_number
                }
              }' > circleci-pipeline.json
          fi

          status="$(
            curl -sS \
              -o circleci-response.json \
              -w "%{http_code}" \
              -X POST \
              -H "Circle-Token: ${CIRCLECI_TOKEN}" \
              -H "Content-Type: application/json" \
              -d @circleci-pipeline.json \
              "${trigger_url}"
          )"

          cat circleci-response.json
          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "CircleCI trigger failed with HTTP ${status}" >&2
            exit 1
          fi
