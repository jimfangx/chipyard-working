name: run generator tests

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number

permissions:
  contents: read
  packages: read

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  test-matrix:
    name: test matrix
    runs-on: ubuntu-latest
    outputs:
      test_names: ${{ steps.tests.outputs.test_names }}
    steps:
      - name: Check out pull request merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge

      - name: Read generator test names
        id: tests
        run: |
          test_names="$(python3 -c 'import json; print(json.dumps(sorted(json.load(open(".github/workflows/config/generator-tests.json")).keys())))')"
          echo "test_names=${test_names}" >> "${GITHUB_OUTPUT}"

  run-generator-test:
    name: ${{ matrix.test_name }}
    needs: test-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        test_name: ${{ fromJson(needs.test-matrix.outputs.test_names) }}
    env:
      DOCKER_DATA_ROOT: ${{ github.workspace }}/.ci/docker
      FORCE_NON_EC2: 1
      JVM_OPTS: -Xmx3200m
    steps:
      - name: Maximize build space
        uses: jimfangx/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 10240
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Move Docker storage to workspace
        run: |
          sudo systemctl stop docker
          sudo mkdir -p "${DOCKER_DATA_ROOT}"
          printf '{ "data-root": "%s" }\n' "${DOCKER_DATA_ROOT}" | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          docker info --format 'Docker root: {{ .DockerRootDir }}'

      - name: Pull Chipyard container
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}:main"
          echo "CHIPYARD_IMAGE=${image_name}" >> "${GITHUB_ENV}"
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker pull "${image_name}"

      - name: Run generator test in container
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          TEST_NAME: ${{ matrix.test_name }}
        run: |
          docker run --rm -i \
            --env "FORCE_NON_EC2=${FORCE_NON_EC2}" \
            --env "JVM_OPTS=${JVM_OPTS}" \
            --env "PR_NUMBER=${PR_NUMBER}" \
            --env "TEST_NAME=${TEST_NAME}" \
            --env "GITHUB_SERVER_URL=${GITHUB_SERVER_URL}" \
            --env "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" \
            "${CHIPYARD_IMAGE}" \
            bash -leo pipefail <<'CONTAINER_SCRIPT'
          cd /root/chipyard
          git config --global --add safe.directory "*"
          git remote set-url origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"

          # Record the submodules initialized in the pulled container.
          initialized_before="$(mktemp)"
          submodules_after="$(mktemp)"
          initialized_targets="$(mktemp)"
          new_targets="$(mktemp)"
          removed_targets="$(mktemp)"

          git submodule status \
            | awk 'substr($1, 1, 1) != "-" { print $2 }' \
            | sort -u > "${initialized_before}"

          # Checkout main in the container.
          git fetch --no-tags origin main
          git checkout --detach FETCH_HEAD

          # Move to GitHub's current PR merge commit.
          git fetch --no-tags origin "pull/${PR_NUMBER}/merge"
          git checkout --detach FETCH_HEAD

          # Compare submodule membership before and after the PR checkout.
          git config --file .gitmodules --get-regexp '^submodule\..*\.path$' \
            | awk '{ print $2 }' \
            | sort -u > "${submodules_after}"

          comm -12 "${initialized_before}" "${submodules_after}" > "${initialized_targets}"
          comm -13 "${initialized_before}" "${submodules_after}" > "${new_targets}"
          comm -23 "${initialized_before}" "${submodules_after}" > "${removed_targets}"

          # Remove submodules deleted by the PR.
          while read -r submodule_path; do
            [ -n "${submodule_path}" ] || continue
            git submodule deinit --force -- "${submodule_path}" || true
            rm -rf -- "${submodule_path}"
          done < "${removed_targets}"

          # Update submodules already initialized in the container.
          while read -r submodule_path; do
            [ -n "${submodule_path}" ] || continue
            git submodule sync -- "${submodule_path}"
            git submodule update --init -- "${submodule_path}"
          done < "${initialized_targets}"

          # Initialize submodules newly added by the PR.
          while read -r submodule_path; do
            [ -n "${submodule_path}" ] || continue
            git submodule init -- "${submodule_path}"
            git submodule sync -- "${submodule_path}"
            git submodule update --init -- "${submodule_path}"
          done < "${new_targets}"

          git rev-parse --short HEAD

          # Initialize only additional submodules needed by this generator test.
          bash .github/scripts/prepare-generator-test-submodules.sh "${TEST_NAME}" /root/chipyard

          # Build tests in both tests/ and tests/build due to legacy paths.
          source env.sh
          cmake -S tests -B tests/ -D CMAKE_BUILD_TYPE=Debug
          cmake --build tests --target clean
          cmake --build tests --target all
          cmake -S tests -B tests/build -D CMAKE_BUILD_TYPE=Debug
          cmake --build tests/build --target clean
          cmake --build tests/build --target all

          python3 .github/scripts/run-generator-test.py "${TEST_NAME}"
          CONTAINER_SCRIPT
