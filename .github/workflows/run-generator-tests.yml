name: run generator tests

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number

permissions:
  contents: read
  packages: read

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  test-matrix:
    name: test matrix
    runs-on: ubuntu-latest
    outputs:
      test_names: ${{ steps.tests.outputs.test_names }}
    steps:
      - name: Check out pull request merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge

      - name: Read generator test names
        id: tests
        run: |
          test_names="$(python3 -c 'import json; print(json.dumps(sorted(json.load(open(".github/workflows/config/generator-tests.json")).keys())))')"
          echo "test_names=${test_names}" >> "${GITHUB_OUTPUT}"

  run-generator-test:
    name: ${{ matrix.test_name }}
    needs: test-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        test_name: ${{ fromJson(needs.test-matrix.outputs.test_names) }}
    container:
      image: ghcr.io/${{ github.repository }}:main
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      FORCE_NON_EC2: 1
      JVM_OPTS: -Xmx3200m
    steps:
      - name: Check out pull request merge ref inside container
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /root/chipyard
          git config --global --add safe.directory "*"
          git remote set-url origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: bearer ${GITHUB_TOKEN}" \
            fetch --no-tags origin "pull/${PR_NUMBER}/merge"
          git checkout --detach FETCH_HEAD
          git submodule sync --recursive
          git submodule update --init --recursive
          git rev-parse --short HEAD

      - name: Compile tests
        run: |
          cd /root/chipyard
          source env.sh
          cmake -S tests -B tests/build -D CMAKE_BUILD_TYPE=Debug
          cmake --build tests/build --target clean
          cmake --build tests/build --target all

      - name: Run generator test
        run: |
          cd /root/chipyard
          python3 .github/scripts/run-generator-test.py "${{ matrix.test_name }}"
