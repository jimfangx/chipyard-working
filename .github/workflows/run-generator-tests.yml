name: run generator tests

on:
  workflow_call:
    inputs:
      container_image:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      container_image:
        description: GHCR image ref built by CircleCI
        required: true
        type: string

permissions:
  contents: read
  packages: read

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  test-matrix:
    name: test matrix
    runs-on: ubuntu-latest
    outputs:
      test_names: ${{ steps.tests.outputs.test_names }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read generator test names from container
        id: tests
        env:
          CONTAINER_IMAGE: ${{ inputs.container_image }}
        run: |
          test_names="$(
            docker run --rm "${CONTAINER_IMAGE}" \
              python3 -c 'import json; print(json.dumps(sorted(json.load(open("/root/chipyard/.github/workflows/config/generator-tests.json")).keys())))'
          )"
          echo "test_names=${test_names}" >> "${GITHUB_OUTPUT}"

  run-generator-test:
    name: ${{ matrix.test_name }}
    needs: test-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        test_name: ${{ fromJson(needs.test-matrix.outputs.test_names) }}
    container:
      image: ${{ inputs.container_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      FORCE_NON_EC2: 1
      JVM_OPTS: -Xmx3200m
    steps:
      - name: Compile tests
        run: |
          cd /root/chipyard
          source env.sh
          cmake -S tests -B tests/build -D CMAKE_BUILD_TYPE=Debug
          cmake --build tests/build --target clean
          cmake --build tests/build --target all

      - name: Run generator test
        run: |
          cd /root/chipyard
          python3 .github/scripts/run-generator-test.py "${{ matrix.test_name }}"
