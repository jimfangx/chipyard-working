            --env "PR_NUMBER=${PR_NUMBER}" \
            --env "GITHUB_SERVER_URL=${GITHUB_SERVER_URL}" \
            --env "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" \
            --entrypoint /bin/bash \
            "${CHIPYARD_IMAGE}" \
            -leo pipefail -c '
              cd /root/chipyard
