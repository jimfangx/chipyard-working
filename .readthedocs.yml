version: 2

build:
    os: ubuntu-24.04
    tools:
        python: "3.12"
        nodejs: "22"
    jobs:
        build:
            html:
                - python -m pip install -r docs/requirements.txt
                - cd docs && npm ci
                - cd docs && python scripts/sphinx_to_starlight.py
                - cd docs && npm run build:astro
                - mkdir -p $READTHEDOCS_OUTPUT/html
                - cp -r docs/dist/* $READTHEDOCS_OUTPUT/html/
