version: 2

build:
    os: ubuntu-24.04
    tools:
        python: "miniforge3-26.3"
    jobs:
        build:
            html:
                - cd docs && npm ci
                - cd docs && npm run build
                - mkdir -p $READTHEDOCS_OUTPUT/html
                - cp -r docs/dist/* $READTHEDOCS_OUTPUT/html/

sphinx:
    configuration: docs/conf.py

conda:
    environment: conda-reqs/docs.yaml
